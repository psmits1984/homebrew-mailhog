name: Flutter Web → GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/claeren_policy_app/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter installeren
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Dependencies ophalen
        working-directory: src/claeren_policy_app
        run: flutter pub get

      - name: Flutter Web bouwen
        working-directory: src/claeren_policy_app
        run: |
          flutter build web \
            --release \
            --base-href "/" \
            --web-renderer html \
            --dart-define=ENV=production \
            --dart-define=API_URL=https://homebrew-mailhog-production.up.railway.app

      - name: GitHub Pages configureren
        uses: actions/configure-pages@v5

      - name: Bestanden uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/claeren_policy_app/build/web

      - name: Deployen naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
