name: Flutter Web → GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/claeren_policy_app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter installeren
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Dependencies ophalen
        working-directory: src/claeren_policy_app
        run: flutter pub get

      - name: Flutter Web bouwen
        working-directory: src/claeren_policy_app
        run: |
          flutter build web \
            --release \
            --base-href "/homebrew-mailhog/" \
            --web-renderer canvaskit \
            --pwa-strategy=none \
            --dart-define=ENV=production \
            --dart-define=API_URL=https://homebrew-mailhog-production.up.railway.app

      - name: Deploy naar GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: src/claeren_policy_app/build/web
          publish_branch: gh-pages
