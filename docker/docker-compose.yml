services:

  bff:
    build:
      context: ../src/Claeren.PolicyApp.BFF
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Features__MockCcs: "false"
      Keycloak__Authority: "http://keycloak:8080/realms/claeren"
      Keycloak__ClientId: "${KEYCLOAK_CLIENT_ID}"
      Keycloak__ClientSecret: "${KEYCLOAK_CLIENT_SECRET}"
      Keycloak__AdminApiUrl: "http://keycloak:8080/admin/realms/claeren"
      Keycloak__AdminClientId: "${KEYCLOAK_ADMIN_CLIENT_ID}"
      Keycloak__AdminClientSecret: "${KEYCLOAK_ADMIN_CLIENT_SECRET}"
      Ccs__BaseUrl: "${CCS_BASE_URL}"
      Ccs__ApiKey: "${CCS_API_KEY}"
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  bff-dev:
    build:
      context: ../src/Claeren.PolicyApp.BFF
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Features__MockCcs: "true"
    profiles:
      - dev
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN_USER:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: "${KEYCLOAK_DB_PASSWORD}"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: "${KEYCLOAK_DB_PASSWORD}"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  keycloak-db-data:
