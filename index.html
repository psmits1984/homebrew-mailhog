<!DOCTYPE html>
<html lang="nl">
<head>
  <base href="/homebrew-mailhog/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA / iPhone "Voeg toe aan beginscherm" -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Claeren">
  <meta name="theme-color" content="#003A6E">

  <!-- Iconen voor iPhone beginscherm -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <title>Claeren</title>

  <style>
    /* Laadscherm in Claeren huisstijl */
    body {
      margin: 0;
      background-color: #003A6E;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #loading-text {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #E8A020;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fix Flutter Web text input on iOS Safari:
       Remove native iOS gray background and border from all HTML inputs
       so Container decoration shows through. Text color stays visible. */
    input, textarea {
      -webkit-appearance: none !important;
      background: transparent !important;
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
    }

    /* Also cover flt-text-editing-host for focused state */
    flt-text-editing-host input,
    flt-text-editing-host textarea {
      opacity: 0.001 !important;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Claeren laden...</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      document.getElementById('loading').remove();
    });

    // Toon foutmelding als Flutter niet start binnen 60 seconden
    setTimeout(() => {
      const el = document.getElementById('loading-text');
      if (el) el.textContent = 'Laadtijd overschreden. Ververs de pagina.';
    }, 60000);

    window.addEventListener('error', (e) => {
      const el = document.getElementById('loading-text');
      if (el) el.textContent = 'Fout: ' + (e.message || 'onbekend');
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
