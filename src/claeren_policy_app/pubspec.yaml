name: claeren_policy_app
description: Claeren mobiele polissen-app – schadeverzekeringen voor particulieren en zakelijke relaties.
version: 1.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigatie
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3+1

  # Lokale opslag
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  pinput: ^5.0.0       # 2FA pincode invoer

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
